<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LotLink — Business Card</title>
<style>
  /* ──────────────────────────────────────────────────────────────
     LotLink Business Card — VistaPrint US Standard
     Trim: 3.5" × 2.0"   Bleed: 0.125" all sides   Full: 3.75" × 2.25"
     Safe area: 0.25" inset from trim edge
     CMYK-safe brand colors (match site CSS)
     ────────────────────────────────────────────────────────────── */
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap');

  @page {
    size: 3.75in 2.25in;
    margin: 0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  html, body { width: 3.75in; height: 2.25in; }

  :root {
    --navy: #0A1A30;
    --navy-deep: #06111F;
    --sky: #5BA3D9;
    --gold: #E8A020;
    --gold-light: #F5B942;
    --cream: #F5EFE3;
  }

  .card {
    width: 3.75in;
    height: 2.25in;
    page-break-after: always;
    page-break-inside: avoid;
    overflow: hidden;
    position: relative;
    background: var(--navy);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
  }
  .card:last-child { page-break-after: auto; }

  /* Subtle radial glow for premium feel — printable as a flat gradient. */
  .card::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 80% 0%, rgba(232,160,32,0.10) 0%, transparent 55%),
      radial-gradient(ellipse at 0% 100%, rgba(91,163,217,0.10) 0%, transparent 55%);
    pointer-events: none;
  }

  /* Hairline grid backdrop — almost invisible, gives the card texture. */
  .card::after {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 0.25in 0.25in;
    pointer-events: none;
  }

  /* Safe area is the 0.25" inset from page edges. Content lives here. */
  .safe {
    position: absolute;
    top: 0.25in; left: 0.25in; right: 0.25in; bottom: 0.25in;
    display: flex;
    flex-direction: column;
    z-index: 2;
  }

  /* ═══════════════════════════════════════════════════════════════
     FRONT
     ═══════════════════════════════════════════════════════════════ */
  .front .brand-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .front .wordmark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38pt;
    line-height: 0.95;
    letter-spacing: 1px;
    color: #fff;
  }
  .front .wordmark .gold { color: var(--gold); }

  .front .tagline-top {
    font-size: 5pt;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--sky);
    margin-top: 0.5pt;
  }

  /* Thin gold rule */
  .front .rule {
    width: 0.5in;
    height: 1.5px;
    background: linear-gradient(90deg, var(--gold), transparent);
    margin: 6pt 0 8pt;
  }

  .front .name-block { margin-top: auto; }
  .front .name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22pt;
    line-height: 1;
    letter-spacing: 1.5px;
    color: #fff;
    margin-bottom: 2pt;
  }
  .front .title {
    font-size: 6.5pt;
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--gold);
  }

  .front .contact {
    display: flex;
    flex-direction: column;
    gap: 1.5pt;
    margin-top: 6pt;
    font-size: 7.5pt;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.2px;
  }
  .front .contact .label {
    color: var(--sky);
    font-weight: 600;
    font-size: 6pt;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    width: 0.32in;
    display: inline-block;
  }

  /* "LL" monogram in the top-right of the front */
  .front .mark {
    position: absolute;
    top: 0;
    right: 0;
    font-family: 'DM Serif Display', serif;
    font-size: 18pt;
    color: rgba(232,160,32,0.30);
    letter-spacing: -1px;
  }

  /* ═══════════════════════════════════════════════════════════════
     BACK
     ═══════════════════════════════════════════════════════════════ */
  .back .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 6pt;
    margin-bottom: 8pt;
  }
  .back .stat {
    flex: 1;
    text-align: center;
  }
  .back .stat .num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22pt;
    line-height: 1;
    color: var(--gold);
    letter-spacing: 0.5px;
  }
  .back .stat .lbl {
    font-size: 5pt;
    font-weight: 600;
    letter-spacing: 1.3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.65);
    margin-top: 2pt;
  }
  .back .stat-divider {
    width: 1px;
    height: 0.28in;
    background: rgba(255,255,255,0.18);
  }

  .back .tagline {
    font-family: 'DM Serif Display', serif;
    font-size: 11pt;
    line-height: 1.25;
    color: #fff;
    text-align: center;
    margin-top: 4pt;
  }
  .back .tagline em {
    color: var(--gold);
    font-style: italic;
  }

  .back .bottom {
    margin-top: auto;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .back .cta {
    font-size: 6pt;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--sky);
    line-height: 1.3;
  }
  .back .cta strong {
    display: block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11pt;
    color: #fff;
    letter-spacing: 1.5px;
    margin-top: 1pt;
  }

  .back .qr {
    width: 0.65in;
    height: 0.65in;
    background: #fff;
    padding: 3pt;
    border-radius: 2pt;
  }
  .back .qr img { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>

  <!-- ═══ FRONT ═══════════════════════════════════════════════ -->

    <div class="mark">LL</div>
    <div class="safe">
